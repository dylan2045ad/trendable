<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trendable</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #eef7ff;
        --muted: #b9d6f2;
        --line: rgba(190, 220, 250, 0.28);
        --paper: #07549d;
        --panel: #ffffff;
        --accent: #22a7ff;
        --accent-strong: #0b6bcb;
        --panel-ink: #111827;
        --panel-muted: #5d6674;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(34, 167, 255, 0.45), transparent 30rem),
          linear-gradient(135deg, #063b79 0%, #07549d 46%, #0a74d4 100%);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(3, 35, 76, 0.68);
        backdrop-filter: blur(10px);
      }

      .wrap {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .brand-photo {
        width: 64px;
        height: 64px;
        border: 2px solid rgba(255, 255, 255, 0.78);
        border-radius: 50%;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.26);
        flex: 0 0 auto;
        object-fit: cover;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .status {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      button {
        appearance: none;
        border: 1px solid var(--accent);
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 40px;
        padding: 0 14px;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      main {
        padding: 24px 0 48px;
      }

      .headlines {
        display: grid;
        gap: 10px;
      }

      .headline {
        display: grid;
        grid-template-columns: 42px minmax(132px, 190px) 1fr;
        gap: 16px;
        align-items: start;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .rank {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: #e9f2fc;
        color: var(--accent-strong);
        font-weight: 800;
      }

      .visual {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 10;
        overflow: hidden;
        border-radius: 7px;
        background:
          radial-gradient(circle at 20% 20%, rgba(34, 167, 255, 0.5), transparent 44%),
          linear-gradient(135deg, #063b79, #0a74d4);
      }

      .visual img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .visual-fallback {
        display: grid;
        place-items: center;
        height: 100%;
        padding: 12px;
        color: #ffffff;
        font-size: 13px;
        font-weight: 800;
        line-height: 1.25;
        text-align: center;
      }

      .headline a {
        color: var(--panel-ink);
        font-size: 17px;
        font-weight: 700;
        line-height: 1.35;
        text-decoration: none;
      }

      .headline a:hover {
        color: var(--accent);
        text-decoration: underline;
      }

      .meta {
        margin-top: 8px;
        color: var(--panel-muted);
        font-size: 13px;
      }

      .summary {
        margin-top: 10px;
        color: #3e4654;
        font-size: 14px;
        line-height: 1.45;
      }

      .empty,
      .warning {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
      }

      .warning {
        margin-top: 14px;
        border-color: #e1b75d;
        background: #fff8e6;
        color: #6f5412;
      }

      @media (max-width: 640px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .brand-photo {
          width: 56px;
          height: 56px;
        }

        button {
          width: 100%;
        }

        .headline {
          grid-template-columns: 34px 1fr;
          padding: 14px;
        }

        .visual {
          grid-column: 2;
          max-width: 260px;
        }

        .headline-body {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div class="brand">
          <img class="brand-photo" src="/dylan.jpg.PNG" alt="Dylan">
          <div>
            <h1>Trendable</h1>
            <div id="status" class="status">Loading top 15 headlines...</div>
          </div>
        </div>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <main class="wrap">
      <section id="headlines" class="headlines" aria-live="polite"></section>
      <div id="warnings"></div>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const headlinesEl = document.getElementById("headlines");
      const warningsEl = document.getElementById("warnings");
      const refreshButton = document.getElementById("refresh");

      function host(url) {
        try {
          return new URL(url).hostname;
        } catch {
          return url;
        }
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]));
      }

      function fallbackText(headline) {
        return String(headline ?? "")
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 5)
          .join(" ");
      }

      function visualSummary(item) {
        if (item.image_url) {
          return `<div class="visual"><img src="${escapeHtml(item.image_url)}" alt=""></div>`;
        }

        return `<div class="visual"><div class="visual-fallback">${escapeHtml(fallbackText(item.text))}</div></div>`;
      }

      function render(data) {
        statusEl.textContent = `${data.count} headlines from ${data.sourceCount} sources in ${data.durationSeconds}s`;
        headlinesEl.innerHTML = data.headlines.map((item, index) => `
          <article class="headline">
            <div class="rank">${index + 1}</div>
            ${visualSummary(item)}
            <div class="headline-body">
              <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.text)}</a>
              <div class="meta">${escapeHtml(host(item.source))}</div>
              ${item.summary ? `<div class="summary">${escapeHtml(item.summary)}</div>` : ""}
            </div>
          </article>
        `).join("") || '<div class="empty">No headlines found.</div>';

        warningsEl.innerHTML = data.errors?.length
          ? `<div class="warning">${data.errors.length} source warning${data.errors.length === 1 ? "" : "s"} while refreshing.</div>`
          : "";
      }

      async function loadTrendable() {
        refreshButton.disabled = true;
        statusEl.textContent = "Scraping sources...";
        try {
          const response = await fetch("/api/trendable?limit=15");
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          render(await response.json());
        } catch (error) {
          statusEl.textContent = "Refresh failed";
          headlinesEl.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        } finally {
          refreshButton.disabled = false;
        }
      }

      refreshButton.addEventListener("click", loadTrendable);
      loadTrendable();
    </script>
  </body>
</html>
